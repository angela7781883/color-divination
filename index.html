<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光語占卜・星光解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --night1:#050818;--purple:#6a5acd;
  --lavender:#c8b8f8;--starw:#f0eaff;--accent:#b8a8f0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Zen Maru Gothic','Nunito',sans-serif;background:var(--night1);color:var(--starw);min-height:100vh;overflow-x:hidden;}
.sky{position:fixed;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 0%,#1a1060 0%,#0d1230 35%,#050818 70%,#020610 100%);z-index:0;}
#starCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.nebula{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.18;z-index:1;pointer-events:none;}
.nebula-1{width:520px;height:320px;top:-80px;left:-100px;background:#7c3aed;}
.nebula-2{width:420px;height:420px;bottom:-60px;right:-120px;background:#1d4ed8;}
.nebula-3{width:320px;height:200px;top:42%;left:28%;background:#9333ea;opacity:0.09;}

#app{position:relative;z-index:2;max-width:500px;margin:0 auto;padding:24px 18px 100px;min-height:100vh;}

/* ── 標題 ── */
.header{text-align:center;padding:44px 0 28px;}
.header-icon{font-size:2.5rem;display:block;margin-bottom:12px;animation:iconFloat 4.5s ease-in-out infinite;filter:drop-shadow(0 0 22px rgba(200,184,248,0.65));}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.header h1{font-size:clamp(1.85rem,7vw,2.7rem);font-weight:700;letter-spacing:.13em;background:linear-gradient(135deg,#ede0ff,#c8b8f8,#9878e8,#ede0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px rgba(168,144,232,.55));line-height:1.3;}
.header .subtitle{font-size:.74rem;color:var(–accent);letter-spacing:.3em;margin-top:10px;opacity:.72;}
.divider{display:flex;align-items:center;gap:10px;margin:0 auto 24px;max-width:200px;}
.divider::before,.divider::after{content:’’;flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(200,184,248,.38),transparent);}
.divider span{color:var(–accent);font-size:13px;opacity:.55;}

/* ── 步驟指示 ── */
.step-indicator{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;transition:all .3s;}
.step-dot.active{background:linear-gradient(135deg,#c8b8f8,#9878e8);color:#1a0a40;}
.step-dot.done{background:rgba(200,184,248,.25);color:var(–lavender);border:1px solid rgba(200,184,248,.4);}
.step-dot.pending{background:rgba(255,255,255,.05);color:rgba(200,184,248,.35);border:1px solid rgba(200,184,248,.15);}
.step-line{width:32px;height:1px;background:rgba(200,184,248,.2);}

/* ── 卡片 ── */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(200,184,248,.16);border-radius:24px;padding:26px 20px;margin-bottom:20px;backdrop-filter:blur(14px);position:relative;overflow:hidden;}
.card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(200,184,248,.42),transparent);}
.card-title{font-size:1rem;font-weight:700;color:var(–lavender);text-align:center;margin-bottom:6px;letter-spacing:.1em;}
.card-sub{font-size:.75rem;color:var(–accent);text-align:center;margin-bottom:20px;opacity:.75;letter-spacing:.06em;}

/* ── 主題按鈕 ── */
.topic-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px;}
.topic-btn{
display:flex;flex-direction:column;align-items:center;gap:7px;
padding:14px 4px 12px;border-radius:16px;border:1.5px solid rgba(200,184,248,.2);
background:rgba(255,255,255,.04);cursor:pointer;transition:all .3s;outline:none;
color:var(–lavender);-webkit-text-fill-color:var(–lavender);
-webkit-appearance:none;appearance:none;
}
.topic-btn:hover{background:rgba(200,184,248,.1);border-color:rgba(200,184,248,.4);transform:translateY(-2px);}
.topic-btn.selected{background:rgba(200,184,248,.18);border-color:var(–lavender);box-shadow:0 0 16px rgba(200,184,248,.25);}
.topic-icon{font-size:1.4rem;line-height:1;color:var(–accent);transition:color .3s;-webkit-text-fill-color:var(–accent);}
.topic-btn.selected .topic-icon,.topic-btn:hover .topic-icon{color:var(–lavender);-webkit-text-fill-color:var(–lavender);}
.topic-name{font-size:.63rem;color:var(–lavender);font-weight:700;letter-spacing:.04em;text-align:center;line-height:1.3;-webkit-text-fill-color:var(–lavender);}
.topic-btn *{color:inherit;}

/* ── 顏色按鈕 ── */
.color-instruction{text-align:center;color:var(–accent);font-size:.8rem;line-height:2;letter-spacing:.05em;margin-bottom:22px;}
.color-instruction strong{color:var(–lavender);font-weight:700;}
.color-grid{display:flex;justify-content:center;gap:8px;flex-wrap:nowrap;margin-bottom:24px;padding:6px 2px;overflow:hidden;}
.color-item{display:flex;flex-direction:column;align-items:center;gap:8px;}
.color-btn{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;position:relative;transition:all .4s cubic-bezier(.34,1.56,.64,1);outline:none;flex-shrink:0;}
.color-btn::after{content:’’;position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.18);opacity:0;transition:opacity .3s;}
.color-btn:hover:not(:disabled)::after{opacity:1;}
.color-btn:hover:not(:disabled){transform:scale(1.1) translateY(-3px);}
.color-btn:disabled{opacity:.2;cursor:not-allowed;transform:scale(.82);}
.color-btn .badge{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#e8e0ff,#a090e8);color:#1a0a40;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(–night1);font-family:‘Nunito’,sans-serif;}
.color-label{font-size:.66rem;color:var(–accent);font-weight:700;letter-spacing:.04em;text-align:center;opacity:.88;}

/* ── 已選序列 ── */
.selected-sequence{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding-top:4px;}
.seq-item{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;transform:scale(.5) translateY(12px);transition:all .45s cubic-bezier(.34,1.56,.64,1);}
.seq-item.visible{opacity:1;transform:scale(1) translateY(0);}
.seq-dot{width:30px;height:30px;border-radius:50%;border:2px solid rgba(200,184,248,.38);box-shadow:0 4px 12px rgba(0,0,0,.3);}
.seq-tag{font-size:.55rem;color:var(–accent);opacity:.72;font-weight:600;letter-spacing:.03em;text-align:center;white-space:nowrap;max-width:44px;line-height:1.3;}

/* ── 按鈕 ── */
.divine-btn{display:block;width:100%;padding:16px;margin-top:22px;background:linear-gradient(135deg,rgba(106,90,205,.32),rgba(90,74,180,.16));border:1.5px solid rgba(200,184,248,.48);border-radius:50px;color:var(–lavender);font-family:‘Zen Maru Gothic’,sans-serif;font-size:1rem;font-weight:700;letter-spacing:.16em;cursor:pointer;transition:all .3s ease;outline:none;}
.divine-btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(106,90,205,.52),rgba(90,74,180,.32));box-shadow:0 0 28px rgba(168,144,232,.32);transform:translateY(-2px);}
.divine-btn:disabled{opacity:.28;cursor:not-allowed;}
.reset-btn{display:block;width:100%;padding:10px;margin-top:10px;background:transparent;border:1px solid rgba(200,184,248,.18);border-radius:50px;color:var(–accent);font-family:‘Zen Maru Gothic’,sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.12em;cursor:pointer;transition:all .3s;outline:none;opacity:.55;}
.reset-btn:hover{opacity:1;border-color:rgba(200,184,248,.42);}

/* ── 結果 ── */
#result-section{display:none;}
#result-section.show{display:block;animation:fadeUp .7s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* 星星卡 */
.star-card{text-align:center;padding:28px 20px 24px;margin-bottom:18px;background:rgba(106,90,205,.09);border:1px solid rgba(200,184,248,.26);border-radius:24px;position:relative;overflow:hidden;}
.star-card::after{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(106,90,205,.07),transparent 70%);}
.star-topic-tag{display:inline-block;background:rgba(200,184,248,.15);border:1px solid rgba(200,184,248,.3);border-radius:20px;padding:4px 16px;font-size:.72rem;color:var(–lavender);letter-spacing:.1em;font-weight:700;margin-bottom:14px;position:relative;z-index:1;}
.star-row{font-size:2.4rem;letter-spacing:8px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 10px rgba(200,184,248,.45));position:relative;z-index:1;}
.star-filled{color:#f0e060;}
.star-empty{color:rgba(200,184,248,.14);}
.star-msg{font-size:.8rem;color:var(–accent);opacity:.88;line-height:1.95;letter-spacing:.05em;position:relative;z-index:1;}

/* 合併解析卡 */
.reading-card{border-radius:22px;padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.reading-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;}
.reading-card.wood{background:rgba(114,196,114,.09);border:1px solid rgba(114,196,114,.26);}
.reading-card.wood::before{background:linear-gradient(to right,transparent,#72C472,transparent);}
.reading-card.fire{background:rgba(232,96,96,.09);border:1px solid rgba(232,96,96,.26);}
.reading-card.fire::before{background:linear-gradient(to right,transparent,#E86060,transparent);}
.reading-card.earth{background:rgba(232,190,64,.09);border:1px solid rgba(232,190,64,.26);}
.reading-card.earth::before{background:linear-gradient(to right,transparent,#E8BE40,transparent);}
.reading-card.metal{background:rgba(200,192,232,.07);border:1px solid rgba(200,192,232,.2);}
.reading-card.metal::before{background:linear-gradient(to right,transparent,#C8C0E8,transparent);}
.reading-card.water{background:rgba(74,144,200,.09);border:1px solid rgba(74,144,200,.26);}
.reading-card.water::before{background:linear-gradient(to right,transparent,#4A90C8,transparent);}

.reading-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.reading-orb{width:38px;height:38px;border-radius:50%;flex-shrink:0;box-shadow:0 3px 14px rgba(0,0,0,.3);}
.reading-meta{flex:1;}
.reading-scene{font-size:.65rem;letter-spacing:.14em;opacity:.48;margin-bottom:2px;font-weight:500;}
.reading-name{font-size:.95rem;font-weight:700;color:var(–lavender);letter-spacing:.06em;}
.reading-body{font-size:.82rem;line-height:1.95;color:rgba(240,234,255,.88);letter-spacing:.04em;}
.reading-body p{margin-bottom:10px;}
.reading-body p:last-child{margin-bottom:0;}

/* 香氛卡（在第四個顏色解析下方） */
.spray-box{margin-top:14px;background:rgba(200,184,248,.1);border:1px solid rgba(200,184,248,.25);border-radius:16px;padding:14px 16px;text-align:center;}
.spray-name{font-size:.95rem;font-weight:700;color:var(–lavender);letter-spacing:.08em;margin-bottom:4px;}
.spray-desc{font-size:.7rem;color:var(–accent);opacity:.8;letter-spacing:.05em;}

/* 訂購區 */
.order-section{text-align:center;padding:26px 20px;background:rgba(106,90,205,.08);border:1px solid rgba(200,184,248,.2);border-radius:22px;margin-bottom:18px;position:relative;overflow:hidden;}
.order-section::before{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(106,90,205,.06),transparent 70%);}
.order-title{font-size:.88rem;font-weight:700;color:var(–lavender);letter-spacing:.1em;margin-bottom:6px;position:relative;z-index:1;}
.order-sub{font-size:.76rem;color:var(–accent);opacity:.8;line-height:1.85;letter-spacing:.05em;margin-bottom:18px;position:relative;z-index:1;}
.order-btn{display:inline-flex;align-items:center;gap:10px;background:#06C755;color:white;border:none;border-radius:50px;padding:14px 30px;font-family:‘Zen Maru Gothic’,sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .3s;text-decoration:none;position:relative;z-index:1;}
.order-btn:hover{background:#05b84e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,199,85,.35);}
.line-logo{width:22px;height:22px;}

/* Toast */
.copy-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,20,60,.95);border:1px solid rgba(200,184,248,.35);border-radius:50px;padding:12px 24px;font-size:.8rem;color:var(–lavender);font-weight:600;letter-spacing:.08em;backdrop-filter:blur(12px);z-index:200;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 載入 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(5,8,24,.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:22px;backdrop-filter:blur(6px);}
.loading-overlay.show{display:flex;}
.loading-ring{width:64px;height:64px;border-radius:50%;border:2.5px solid transparent;border-top-color:var(–lavender);border-right-color:rgba(200,184,248,.22);animation:spin 1.3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:1rem;color:var(–lavender);letter-spacing:.25em;font-weight:600;animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

.footer{text-align:center;padding:24px 0;font-size:.66rem;color:rgba(200,184,248,.2);letter-spacing:.18em;}
@media(max-width:380px){.color-btn{width:44px;height:44px;}.color-grid{gap:6px;}.color-label{font-size:.58rem;}.topic-icon{font-size:1.3rem;}.topic-name{font-size:.58rem;}}
</style>

</head>
<body>
<div class="sky"></div>
<canvas id="starCanvas"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>
<div class="copy-toast" id="copy-toast">✦ 占卜結果已複製！前往賣場選購香氛吧 🌙</div>
<div class="loading-overlay" id="loading">
  <div class="loading-ring"></div>
  <div class="loading-text">星光解讀中…</div>
</div>

<div id="app">
  <div class="header">
    <span class="header-icon">✨</span>
    <h1>光語占卜</h1>
    <div class="subtitle">色 彩 占 卜 ・ 星 光 解 析</div>
  </div>
  <div class="divider"><span>✦</span></div>

  <!-- 步驟指示 -->

  <div class="step-indicator" id="step-indicator">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line"></div>
    <div class="step-dot pending" id="dot2">2</div>
    <div class="step-line"></div>
    <div class="step-dot pending" id="dot3">✦</div>
  </div>

  <!-- 第一步：選主題 -->

  <div class="card" id="step1-card">
    <div class="card-title">✦ 你想了解什麼？✦</div>
    <div class="card-sub">選擇此刻最想看見答案的方向</div>
    <div class="topic-grid" id="topic-grid"></div>
    <button class="divine-btn" id="next-btn" disabled onclick="goStep2()">
      ✦ 下一步，選擇你的顏色 ✦
    </button>
  </div>

  <!-- 第二步：選顏色 -->

  <div class="card" id="step2-card" style="display:none">
    <div class="card-title">✦ 跟著直覺，選出五個顏色 ✦</div>
    <div class="color-instruction">
      閉上眼睛深呼吸一下<br>
      再睜開眼，<strong>按照直覺的順序</strong>點選顏色<br>
      不需要想太多，第一個感覺最重要 ✨
    </div>
    <div class="color-grid" id="color-grid"></div>
    <div class="selected-sequence" id="seq-display"></div>
    <button class="divine-btn" id="divine-btn" disabled onclick="startDivination()">
      ✦ 讓星光告訴你答案 ✦
    </button>
    <button class="reset-btn" onclick="resetAll()">↺ 重新開始</button>
  </div>

  <!-- 結果 -->

  <div id="result-section">
    <div id="reading-card-container"></div>
    <div class="order-section" id="order-section"></div>
    <button class="reset-btn" onclick="resetAll()" style="margin-bottom:24px;">↺ 再占一次</button>
  </div>

  <div class="footer">光語占卜 ・ 星光解析 ✦ 僅供娛樂參考</div>
</div>

<script>
// ═══ 主題 ═══════════════════════════════════════
const TOPICS = [
  { id:'wealth',  name:'財運', icon:'◎' },
  { id:'love',    name:'感情', icon:'♡' },
  { id:'career',  name:'事業', icon:'◈' },
  { id:'family',  name:'家運', icon:'⌂' },
  { id:'child',   name:'子女運', icon:'✿' },
];

// ═══ 五行 ════════════════════════════════════════
const ELEMENT_CFG = {
  wood:  { starName:'翠星', color:'#72C472', light:'#c8f0c0' },
  fire:  { starName:'赤矅', color:'#E86060', light:'#ffc0c0' },
  earth: { starName:'金曜', color:'#E8BE40', light:'#ffe89a' },
  metal: { starName:'皓月', color:'#C8C0E8', light:'#ffffff'  },
  water: { starName:'深淵', color:'#4A90C8', light:'#a8d8ff' },
};
const ELEMENTS_ORDER = ['wood','fire','earth','metal','water'];

const BTN_STYLES = {
  wood:  { bg:'#72c472', from:'#c8f0c0', shadow:'rgba(114,196,114,0.5)'  },
  fire:  { bg:'#e86060', from:'#ffc0c0', shadow:'rgba(232,96,96,0.5)'    },
  earth: { bg:'#e8be40', from:'#ffe89a', shadow:'rgba(232,190,64,0.55)'  },
  metal: { bg:'#b0a8e0', from:'#ffffff', shadow:'rgba(200,184,248,0.65)' },
  water: { bg:'#4a90c8', from:'#a8d8ff', shadow:'rgba(74,144,200,0.5)'   },
};

// ═══ 五行相生相剋 ════════════════════════════════
const generates = {wood:'fire',fire:'earth',earth:'metal',metal:'water',water:'wood'};
const restricts = {wood:'earth',fire:'metal',earth:'water',metal:'wood',water:'fire'};
function getLuck(me,out){
  if(generates[out]===me) return 4;
  if(restricts[me]===out) return 3;
  if(generates[me]===out) return 2;
  if(restricts[out]===me) return 1;
  return 3;
}
const STAR_MSG = {
  4:'能量相輔相成，你與所渴望的結果之間有著天然的默契。此刻的每一份努力都格外有力量，星光正溫柔地護送你前進。',
  3:'你掌握著自己生命的主導權，只要方向清晰，你有能力把想要的帶到身邊。保持清醒的心，就是你最好的指引。',
  2:'你正用自己的方式滋養著這份結果慢慢成熟，需要多一點耐心。播下的種子終會開花，星光一直在等著你。',
  1:'此刻有些阻力悄悄流動，但這從不是終點。覺察本身就是最有力量的保護，帶著溫柔的清醒繼續走，新的風景就在調整之後。',
};

// ═══ 香氛噴霧 ════════════════════════════════════
const SPRAY = {
  wood:  { name:'✧ 晨星甦醒 能量噴霧', desc:'清新植物香調・重燃生命力' },
  fire:  { name:'✧ 赤焰玫光 能量噴霧', desc:'溫柔花香調・撫慰熾熱的心' },
  earth: { name:'✧ 蜜土暖陽 能量噴霧', desc:'大地木質香調・重新充滿能量' },
  metal: { name:'✧ 皓月靜境 能量噴霧', desc:'純淨清透香調・清空雜念歸零' },
  water: { name:'✧ 深淵星流 能量噴霧', desc:'深邃神秘香調・找回內心的平靜' },
};

// ═══ 顏色意象名 ══════════════════════════════════
const COLOR_IMAGE = {
  wood: '翠星・初春第一抹新綠',
  fire: '赤矅・燃燒的熱情之光',
  earth:'金曜・大地溫柔的懷抱',
  metal:'皓月・夜空最靜的清輝',
  water:'深淵・流動的沉靜智慧',
};

// ═══ 五行中文名（解析用）══════════════════════════
const EL_NAME = {
  wood:'木',fire:'火',earth:'土',metal:'金',water:'水'

// ═══ STAR CANVAS ══════════════════════════════
const canvas=document.getElementById('starCanvas');
const ctx=canvas.getContext('2d');
let stars=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
function initStars(){
  stars=[];
  const n=Math.floor(canvas.width*canvas.height/2800);
  for(let i=0;i<n;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.8+.25,base:Math.random()*.65+.15,spd:Math.random()*.018+.004,ph:Math.random()*Math.PI*2,col:Math.random()>.8?'#c8b8f8':Math.random()>.65?'#e8e0ff':'#ffffff'});
  }
}
function drawStars(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    const a=s.base*(.45+.55*Math.sin(t*s.spd+s.ph));
    ctx.globalAlpha=a;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col;ctx.fill();
    if(s.r>1.3){const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*6);g.addColorStop(0,s.col==='#c8b8f8'?'rgba(200,184,248,.22)':'rgba(255,255,255,.18)');g.addColorStop(1,'transparent');ctx.globalAlpha=a*.45;ctx.beginPath();ctx.arc(s.x,s.y,s.r*6,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  }
  ctx.globalAlpha=1;
}
function loop(){drawStars(performance.now()/1000);requestAnimationFrame(loop);}
resize();initStars();loop();
window.addEventListener('resize',()=>{resize();initStars();});

let selectedTopic = null;

const SEQ_TAGS = ['✦ 你','漣漪','卡住','開心','星光'];

// ═══ 步驟指示更新 ══════════════════════════════
function updateStepDots(step){
  const d=['dot1','dot2','dot3'];
  d.forEach((id,i)=>{
    const el=document.getElementById(id);
    el.className='step-dot '+(i+1<step?'done':i+1===step?'active':'pending');
  });
}

// ═══ 主題按鈕 ══════════════════════════════════
function buildTopicGrid(){
  const grid=document.getElementById('topic-grid');
  grid.innerHTML='';
  TOPICS.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='topic-btn';
    btn.innerHTML=`<span class="topic-icon">${t.icon}</span><span class="topic-name">${t.name}</span>`;
    btn.onclick=()=>selectTopic(t.id,btn);
    grid.appendChild(btn);
  });
}
buildTopicGrid();

function selectTopic(id, btn){
  selectedTopic=id;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('next-btn').disabled=false;
}

function goStep2(){
  if(!selectedTopic) return;
  document.getElementById('step1-card').style.display='none';
  document.getElementById('step2-card').style.display='block';
  buildColorGrid();
  updateStepDots(2);
  document.getElementById('step2-card').scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══ 顏色按鈕 ══════════════════════════════════
function buildColorGrid(){
  const grid=document.getElementById('color-grid');
  grid.innerHTML='';
  ELEMENTS_ORDER.forEach(el=>{
    const cfg=ELEMENT_CFG[el];
    const s=BTN_STYLES[el];
    const item=document.createElement('div');item.className='color-item';
    const btn=document.createElement('button');btn.className='color-btn';btn.dataset.el=el;
    btn.style.background=`radial-gradient(circle at 35% 30%,${s.from} 0%,${s.bg} 60%,${s.bg} 100%)`;
    btn.style.boxShadow=`0 0 0 3px ${s.shadow.replace('.5','.25')},0 6px 20px ${s.shadow},inset 0 1px 0 rgba(255,255,255,.4)`;
    btn.onclick=()=>pick(el);
    const label=document.createElement('div');label.className='color-label';label.textContent=cfg.starName;
    item.appendChild(btn);item.appendChild(label);
    grid.appendChild(item);
  });
}

function pick(el){
  if(sel.includes(el)||sel.length>=5) return;
  sel.push(el);
  const btn=document.querySelector(`.color-btn[data-el="${el}"]`);
  btn.disabled=true;
  btn.innerHTML=`<span class="badge">${sel.length}</span>`;
  updateSeq();
  if(sel.length===5) document.getElementById('divine-btn').disabled=false;
}

function updateSeq(){
  const c=document.getElementById('seq-display');c.innerHTML='';
  sel.forEach((el,i)=>{
    const cfg=ELEMENT_CFG[el];
    const item=document.createElement('div');item.className='seq-item';
    item.innerHTML=`<div class="seq-dot" style="background:radial-gradient(circle at 35% 30%,${cfg.light},${cfg.color} 70%)"></div><div class="seq-tag">${SEQ_TAGS[i]}</div>`;
    c.appendChild(item);
    setTimeout(()=>item.classList.add('visible'),40);
  });
}

// ═══ 占卜 ═════════════════════════════════════
function startDivination(){
  if(sel.length<5) return;
  document.getElementById('loading').classList.add('show');
  setTimeout(()=>{
    document.getElementById('loading').classList.remove('show');
    renderResult();
    updateStepDots(3);
    const rs=document.getElementById('result-section');
    rs.classList.add('show');
    rs.scrollIntoView({behavior:'smooth',block:'start'});
  },2400);
}
