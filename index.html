<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光語占卜・星光解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-green: #72C472;
  --c-red:   #E86060;
  --c-yellow:#E8BE40;
  --c-white: #C8C0E8;
  --c-blue:  #4A90C8;
  --night1:  #050818;
  --purple:  #6a5acd;
  --lavender:#c8b8f8;
  --starw:   #f0eaff;
  --accent:  #b8a8f0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Zen Maru Gothic', 'Nunito', sans-serif;
  background: var(--night1);
  color: var(--starw);
  min-height: 100vh;
  overflow-x: hidden;
}
.sky {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 100% 80% at 50% 0%,
    #1a1060 0%, #0d1230 35%, #050818 70%, #020610 100%);
  z-index: 0;
}
#starCanvas { position:fixed;inset:0;z-index:1;pointer-events:none; }
.nebula {
  position:fixed;border-radius:50%;filter:blur(90px);opacity:0.18;z-index:1;pointer-events:none;
}
.nebula-1{width:520px;height:320px;top:-80px;left:-100px;background:#7c3aed;}
.nebula-2{width:420px;height:420px;bottom:-60px;right:-120px;background:#1d4ed8;}
.nebula-3{width:320px;height:200px;top:42%;left:28%;background:#9333ea;opacity:0.09;}

/* ── App 容器 ── */
#app {
position:relative;z-index:2;
max-width:500px;margin:0 auto;
padding:24px 18px 120px;min-height:100vh;
}

/* ── 標題 ── */
.header { text-align:center;padding:48px 0 32px; }
.header-icon {
font-size:2.6rem;display:block;margin-bottom:14px;
animation:iconFloat 4.5s ease-in-out infinite;
filter:drop-shadow(0 0 22px rgba(200,184,248,0.65));
}
@keyframes iconFloat{
0%,100%{transform:translateY(0) scale(1)}
50%{transform:translateY(-9px) scale(1.04)}
}
.header h1 {
font-family:‘Zen Maru Gothic’,sans-serif;
font-size:clamp(1.85rem,7vw,2.75rem);font-weight:700;letter-spacing:0.13em;
background:linear-gradient(135deg,#ede0ff,#c8b8f8,#9878e8,#ede0ff);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
filter:drop-shadow(0 0 18px rgba(168,144,232,0.55));line-height:1.3;
}
.header .subtitle {
font-size:0.74rem;color:var(–accent);letter-spacing:0.3em;
margin-top:11px;opacity:0.72;font-weight:400;
}
.divider {
display:flex;align-items:center;gap:10px;margin:0 auto 28px;max-width:220px;
}
.divider::before,.divider::after {
content:’’;flex:1;height:1px;
background:linear-gradient(to right,transparent,rgba(200,184,248,0.38),transparent);
}
.divider span{color:var(–accent);font-size:13px;opacity:0.55;}

/* ── 卡片 ── */
.card {
background:rgba(255,255,255,0.035);
border:1px solid rgba(200,184,248,0.16);
border-radius:26px;padding:28px 22px;margin-bottom:20px;
backdrop-filter:blur(14px);position:relative;overflow:hidden;
}
.card::before {
content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(to right,transparent,rgba(200,184,248,0.42),transparent);
}
.card-title {
font-size:1rem;font-weight:700;color:var(–lavender);
text-align:center;margin-bottom:18px;letter-spacing:0.1em;
}
.color-instruction {
text-align:center;color:var(–accent);font-size:0.81rem;
line-height:2.1;letter-spacing:0.06em;margin-bottom:28px;font-weight:400;
}
.color-instruction strong{color:var(–lavender);font-weight:700;}

/* ── 顏色按鈕 (夢幻版) ── */
.color-grid {
display:flex;justify-content:center;gap:8px;flex-wrap:nowrap;
margin-bottom:24px;padding:6px 2px;overflow:hidden;
}
.color-item { display:flex;flex-direction:column;align-items:center;gap:8px; }

.color-btn {
width:50px;height:50px;border-radius:50%;
border:none;cursor:pointer;position:relative;
transition:all 0.4s cubic-bezier(.34,1.56,.64,1);outline:none;
flex-shrink:0;
}

/* 夢幻外圈光暈環 */
.color-btn::before {
content:’’;position:absolute;inset:-4px;border-radius:50%;
opacity:0;transition:opacity 0.4s ease;
}
.color-btn:hover:not(:disabled)::before { opacity:1; }

.color-btn::after {
content:’’;position:absolute;inset:0;border-radius:50%;
background:rgba(255,255,255,0.18);opacity:0;transition:opacity 0.3s;
}
.color-btn:hover:not(:disabled)::after{opacity:1;}

.color-btn:hover:not(:disabled) {
transform:scale(1.1) translateY(-3px);
}
.color-btn:disabled{opacity:0.2;cursor:not-allowed;transform:scale(0.82);}

/* 各顏色備用底色（JS 會覆蓋為漸層） */
.color-btn[data-el=“wood”]  { background:#72c472; }
.color-btn[data-el=“fire”]  { background:#e86060; }
.color-btn[data-el=“earth”] { background:#e8be40; }
.color-btn[data-el=“metal”] { background:#b0a8e0; }
.color-btn[data-el=“water”] { background:#4a90c8; }
.color-btn[data-el=“wood”]::before  { background:radial-gradient(circle,rgba(114,196,114,0.5) 0%,transparent 70%); }
.color-btn[data-el=“fire”]::before  { background:radial-gradient(circle,rgba(232,96,96,0.5) 0%,transparent 70%); }
.color-btn[data-el=“earth”]::before { background:radial-gradient(circle,rgba(232,190,64,0.5) 0%,transparent 70%); }
.color-btn[data-el=“metal”]::before { background:radial-gradient(circle,rgba(200,184,248,0.65) 0%,transparent 70%); }
.color-btn[data-el=“water”]::before { background:radial-gradient(circle,rgba(74,144,200,0.5) 0%,transparent 70%); }

.color-btn .badge {
position:absolute;top:-7px;right:-7px;width:24px;height:24px;border-radius:50%;
background:linear-gradient(135deg,#e8e0ff,#a090e8);color:#1a0a40;
font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;
border:2px solid var(–night1);font-family:‘Nunito’,sans-serif;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* 星空顏色名稱（只有一個詞） */
.color-label {
font-size:0.72rem;color:var(–accent);font-weight:700;
letter-spacing:0.06em;text-align:center;opacity:0.9;
}

/* ── 已選序列 ── */
.selected-sequence {
display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding-top:4px;
}
.seq-item {
display:flex;flex-direction:column;align-items:center;gap:5px;
opacity:0;transform:scale(0.5) translateY(12px);
transition:all 0.45s cubic-bezier(.34,1.56,.64,1);
}
.seq-item.visible{opacity:1;transform:scale(1) translateY(0);}
.seq-dot {
width:34px;height:34px;border-radius:50%;
border:2px solid rgba(200,184,248,0.38);
box-shadow:0 4px 14px rgba(0,0,0,0.32);
}
.seq-tag {
font-size:0.6rem;color:var(–accent);opacity:0.72;font-weight:600;
letter-spacing:0.04em;text-align:center;white-space:nowrap;
max-width:50px;line-height:1.3;
}

/* ── 按鈕 ── */
.divine-btn {
display:block;width:100%;padding:17px;margin-top:26px;
background:linear-gradient(135deg,rgba(106,90,205,0.32),rgba(90,74,180,0.16));
border:1.5px solid rgba(200,184,248,0.48);border-radius:50px;
color:var(–lavender);font-family:‘Zen Maru Gothic’,sans-serif;
font-size:1.02rem;font-weight:700;letter-spacing:0.16em;
cursor:pointer;transition:all 0.3s ease;outline:none;
}
.divine-btn:hover:not(:disabled){
background:linear-gradient(135deg,rgba(106,90,205,0.52),rgba(90,74,180,0.32));
box-shadow:0 0 30px rgba(168,144,232,0.32);transform:translateY(-2px);
}
.divine-btn:disabled{opacity:0.28;cursor:not-allowed;}
.reset-btn {
display:block;width:100%;padding:11px;margin-top:10px;
background:transparent;border:1px solid rgba(200,184,248,0.18);
border-radius:50px;color:var(–accent);font-family:‘Zen Maru Gothic’,sans-serif;
font-size:0.8rem;font-weight:500;letter-spacing:0.12em;
cursor:pointer;transition:all 0.3s;outline:none;opacity:0.55;
}
.reset-btn:hover{opacity:1;border-color:rgba(200,184,248,0.42);}

/* ── 結果 ── */
#result-section{display:none;}
#result-section.show{display:block;animation:fadeUp 0.7s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.star-card {
text-align:center;padding:32px 20px 28px;margin-bottom:20px;
background:rgba(106,90,205,0.09);border:1px solid rgba(200,184,248,0.26);
border-radius:26px;position:relative;overflow:hidden;
}
.star-card::after{
content:’’;position:absolute;inset:0;
background:radial-gradient(ellipse at center,rgba(106,90,205,0.07),transparent 70%);
}
.star-row {
font-size:2.6rem;letter-spacing:8px;display:block;margin-bottom:16px;
filter:drop-shadow(0 0 10px rgba(200,184,248,0.45));position:relative;z-index:1;
}
.star-filled{color:#f0e060;}
.star-empty{color:rgba(200,184,248,0.14);}
.star-msg{
font-size:0.82rem;color:var(–accent);opacity:0.88;
line-height:1.95;letter-spacing:0.06em;
position:relative;z-index:1;
}

/* 位置卡 */
.pos-card {
border-radius:22px;padding:22px 20px;margin-bottom:16px;
position:relative;overflow:hidden;
}
.pos-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;}
.pos-card.wood {background:rgba(114,196,114,0.09);border:1px solid rgba(114,196,114,0.26);}
.pos-card.wood::before{background:linear-gradient(to right,transparent,#72C472,transparent);}
.pos-card.fire {background:rgba(232,96,96,0.09);border:1px solid rgba(232,96,96,0.26);}
.pos-card.fire::before{background:linear-gradient(to right,transparent,#E86060,transparent);}
.pos-card.earth{background:rgba(232,190,64,0.09);border:1px solid rgba(232,190,64,0.26);}
.pos-card.earth::before{background:linear-gradient(to right,transparent,#E8BE40,transparent);}
.pos-card.metal{background:rgba(200,192,232,0.07);border:1px solid rgba(200,192,232,0.2);}
.pos-card.metal::before{background:linear-gradient(to right,transparent,#C8C0E8,transparent);}
.pos-card.water{background:rgba(74,144,200,0.09);border:1px solid rgba(74,144,200,0.26);}
.pos-card.water::before{background:linear-gradient(to right,transparent,#4A90C8,transparent);}

.pos-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.pos-orb{
width:40px;height:40px;border-radius:50%;flex-shrink:0;
box-shadow:0 3px 14px rgba(0,0,0,0.32);
}
.pos-orb.wood {background:radial-gradient(circle at 35% 30%,#c8f0c0,#72C472 70%);}
.pos-orb.fire {background:radial-gradient(circle at 35% 30%,#ffc0c0,#E86060 70%);}
.pos-orb.earth{background:radial-gradient(circle at 35% 30%,#ffe89a,#E8BE40 70%);}
.pos-orb.metal{background:radial-gradient(circle at 35% 30%,#fff,#C8C0E8 70%);}
.pos-orb.water{background:radial-gradient(circle at 35% 30%,#a8d8ff,#4A90C8 70%);}

.pos-meta{flex:1;}
.pos-scene{font-size:0.68rem;letter-spacing:0.15em;opacity:0.48;margin-bottom:3px;font-weight:500;}
.pos-name{font-size:1rem;font-weight:700;color:var(–lavender);letter-spacing:0.06em;}
.pos-body{
font-size:0.82rem;line-height:1.95;
color:rgba(240,234,255,0.87);letter-spacing:0.04em;font-weight:400;
}
.aroma-chip {
display:inline-block;
background:rgba(168,144,232,0.17);
border:1px solid rgba(200,184,248,0.26);
border-radius:20px;padding:3px 12px;
font-size:0.72rem;color:var(–lavender);
margin:4px 3px;letter-spacing:0.04em;font-weight:600;
}

/* ── LINE 區（更新版） ── */
.line-section {
text-align:center;padding:28px 22px;
background:rgba(106,90,205,0.08);
border:1px solid rgba(200,184,248,0.22);
border-radius:22px;margin-bottom:18px;position:relative;overflow:hidden;
}
.line-section::before{
content:’’;position:absolute;inset:0;
background:radial-gradient(ellipse at center,rgba(106,90,205,0.06),transparent 70%);
}
.line-section .aroma-prompt {
font-size:0.88rem;font-weight:700;color:var(–lavender);
letter-spacing:0.08em;margin-bottom:10px;position:relative;z-index:1;
}
.line-chips {
display:flex;justify-content:center;flex-wrap:wrap;gap:6px;
margin-bottom:16px;position:relative;z-index:1;
}
.line-chip {
background:rgba(200,184,248,0.15);
border:1px solid rgba(200,184,248,0.3);
border-radius:20px;padding:4px 14px;
font-size:0.75rem;color:var(–lavender);
letter-spacing:0.06em;font-weight:600;
}
.line-sub {
font-size:0.76rem;color:var(–accent);
opacity:0.78;margin-bottom:18px;
line-height:1.85;letter-spacing:0.06em;
position:relative;z-index:1;
}
.line-btn {
display:inline-flex;align-items:center;gap:10px;background:#06C755;
color:white;border:none;border-radius:50px;padding:13px 28px;
font-family:‘Zen Maru Gothic’,sans-serif;font-size:0.88rem;font-weight:700;
letter-spacing:0.08em;cursor:pointer;transition:all 0.3s;text-decoration:none;
position:relative;z-index:1;
}
.line-btn:hover{
background:#05b84e;transform:translateY(-2px);
box-shadow:0 8px 24px rgba(6,199,85,0.35);
}
.line-logo{width:22px;height:22px;}

/* ── 複製提示 Toast ── */
.copy-toast {
position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
background:rgba(30,20,60,0.95);border:1px solid rgba(200,184,248,0.35);
border-radius:50px;padding:12px 24px;
font-size:0.82rem;color:var(–lavender);font-weight:600;letter-spacing:0.08em;
backdrop-filter:blur(12px);z-index:200;
opacity:0;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 載入 ── */
.loading-overlay {
display:none;position:fixed;inset:0;background:rgba(5,8,24,0.88);
z-index:100;align-items:center;justify-content:center;
flex-direction:column;gap:22px;backdrop-filter:blur(6px);
}
.loading-overlay.show{display:flex;}
.loading-ring {
width:64px;height:64px;border-radius:50%;
border:2.5px solid transparent;
border-top-color:var(–lavender);
border-right-color:rgba(200,184,248,0.22);
animation:spin 1.3s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
font-size:1rem;color:var(–lavender);letter-spacing:0.25em;
font-weight:600;animation:blink 1.8s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}
.footer{
text-align:center;padding:24px 0;
font-size:0.68rem;color:rgba(200,184,248,0.2);letter-spacing:0.18em;
}
@media(max-width:380px){
.color-btn{width:44px;height:44px;}
.color-grid{gap:6px;}
.color-label{font-size:0.62rem;}
}
</style>

</head>
<body>
<div class="sky"></div>
<canvas id="starCanvas"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="copy-toast" id="copy-toast">✦ 占卜結果已複製！貼到 LINE 傳給我吧 🌙</div>

<div class="loading-overlay" id="loading">
  <div class="loading-ring"></div>
  <div class="loading-text">星光解讀中…</div>
</div>

<div id="app">
  <div class="header">
    <span class="header-icon">✨</span>
    <h1>光語占卜</h1>
    <div class="subtitle">色 彩 占 卜 ・ 星 光 解 析</div>
  </div>

  <div class="divider"><span>✦</span></div>

  <div class="card" id="select-card">
    <div class="card-title">✦ 跟著直覺，選出你的五個顏色 ✦</div>
    <div class="color-instruction">
      閉上眼睛深呼吸一下<br>
      再睜開眼，<strong>按照直覺的順序</strong>點選顏色<br>
      不需要想太多，第一個感覺最重要 ✨
    </div>
    <div class="color-grid" id="color-grid"></div>
    <div class="selected-sequence" id="seq-display"></div>
    <button class="divine-btn" id="divine-btn" disabled onclick="startDivination()">
      ✦ 讓星光告訴你答案 ✦
    </button>
    <button class="reset-btn" onclick="resetAll()">↺ 重新選擇</button>
  </div>

  <div id="result-section">
    <div class="star-card" id="star-card"></div>
    <div id="pos-cards"></div>
    <div class="line-section" id="line-section">
      <!-- 由 JS 依第4個顏色動態產生 -->
    </div>
    <button class="reset-btn" onclick="resetAll()" style="margin-bottom:24px;">↺ 再占一次</button>
  </div>

  <div class="footer">光語占卜 ・ 星光解析 ✦ 僅供娛樂參考</div>
</div>

<script>
// ═══ DATA ══════════════════════════════════════════

// 五行顏色設定 — 星空意象名（單一詞）
const ELEMENT_CFG = {
  wood:  { starName:'翠星',  color:'#72C472', light:'#a8e4a0' },
  fire:  { starName:'赤矅',  color:'#E86060', light:'#f4a0a0' },
  earth: { starName:'金曜',  color:'#E8BE40', light:'#fce488' },
  metal: { starName:'皓月',  color:'#C8C0E8', light:'#ffffff'  },
  water: { starName:'深淵',  color:'#4A90C8', light:'#80c8f8' },
};

const ELEMENTS_ORDER = ['wood','fire','earth','metal','water'];

// 情感語境位置名
const POS_SCENE = [
  '此刻的你',
  '心裡的漣漪',
  '卡住的地方',
  '打開心的方式',
  '星光指向你的地方',
];

// 顏色意象名（解析卡副標）
const COLOR_IMAGE = {
  wood:  '翠星・初春第一抹新綠',
  fire:  '赤矅・燃燒的熱情之光',
  earth: '金曜・大地溫柔的懷抱',
  metal: '皓月・夜空最靜的清輝',
  water: '深淵・流動的沉靜智慧',
};

// 五行相生相剋
const generates = { wood:'fire',fire:'earth',earth:'metal',metal:'water',water:'wood' };
const restricts = { wood:'earth',fire:'metal',earth:'water',metal:'wood',water:'fire' };

function getLuck(me, out) {
  if (generates[out] === me) return 4;
  if (restricts[me]  === out) return 3;
  if (generates[me]  === out) return 2;
  if (restricts[out] === me)  return 1;
  return 3;
}

const STAR_MSG = {
  4:'能量相輔相成，你與所渴望的結果之間有著天然的默契。此刻的每一份努力都格外有力量，星光正溫柔地護送你前進。',
  3:'你掌握著自己生命的主導權，只要方向清晰，你有能力把想要的帶到身邊。保持清醒的心，就是你最好的指引。',
  2:'你正用自己的方式滋養著這份結果慢慢成熟，需要多一點耐心。播下的種子終會開花，星光一直在等著你。',
  1:'此刻有些阻力悄悄流動，但這從不是終點。覺察本身就是最有力量的保護，帶著溫柔的清醒繼續走，新的風景就在調整之後。',
};

const READINGS = {
  p1:{

// ═══ STAR CANVAS ══════════════════════════════
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
function initStars(){
  stars=[];
  const n=Math.floor(canvas.width*canvas.height/2800);
  for(let i=0;i<n;i++){
    stars.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:Math.random()*1.8+0.25,
      base:Math.random()*0.65+0.15,
      spd:Math.random()*0.018+0.004,
      ph:Math.random()*Math.PI*2,
      col:Math.random()>0.8?'#c8b8f8':Math.random()>0.65?'#e8e0ff':'#ffffff',
    });
  }
}
function drawStars(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    const a=s.base*(0.45+0.55*Math.sin(t*s.spd+s.ph));
    ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.col;ctx.fill();
    if(s.r>1.3){
      const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*6);
      g.addColorStop(0,s.col==='#c8b8f8'?'rgba(200,184,248,0.22)':'rgba(255,255,255,0.18)');
      g.addColorStop(1,'transparent');
      ctx.globalAlpha=a*0.45;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r*6,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}
function loop(){ drawStars(performance.now()/1000); requestAnimationFrame(loop); }
resize(); initStars(); loop();
window.addEventListener('resize',()=>{ resize(); initStars(); });

  wood:  { bg:'#72c472', from:'#c8f0c0', shadow:'rgba(114,196,114,0.5)' },
  fire:  { bg:'#e86060', from:'#ffc0c0', shadow:'rgba(232,96,96,0.5)'   },
  earth: { bg:'#e8be40', from:'#ffe89a', shadow:'rgba(232,190,64,0.55)' },
  metal: { bg:'#b0a8e0', from:'#ffffff', shadow:'rgba(200,184,248,0.65)'},
  water: { bg:'#4a90c8', from:'#a8d8ff', shadow:'rgba(74,144,200,0.5)'  },
};

function buildGrid(){
  const grid=document.getElementById('color-grid');
  grid.innerHTML='';
  ELEMENTS_ORDER.forEach(el=>{
    const cfg=ELEMENT_CFG[el];
    const s=BTN_STYLES[el];
    const item=document.createElement('div');
    item.className='color-item';
    const btn=document.createElement('button');
    btn.className='color-btn';
    btn.dataset.el=el;
    btn.style.background=`radial-gradient(circle at 35% 30%, ${s.from} 0%, ${s.bg} 60%, ${s.bg} 100%)`;
    btn.style.boxShadow=`0 0 0 3px ${s.shadow.replace('0.5','0.25')}, 0 6px 20px ${s.shadow}, inset 0 1px 0 rgba(255,255,255,0.4)`;
    btn.onclick=()=>pick(el);
    const label=document.createElement('div');
    label.className='color-label';
    label.textContent=cfg.starName;
    item.appendChild(btn);
    item.appendChild(label);
    grid.appendChild(item);
  });
}
buildGrid();

// ═══ SELECTION ════════════════════════════════
let sel=[];
const SEQ_TAGS=['✦ 你','漣漪','卡住','開心','星光'];

function pick(el){
  if(sel.includes(el)||sel.length>=5) return;
  sel.push(el);
  const btn=document.querySelector(`.color-btn[data-el="${el}"]`);
  btn.disabled=true;
  btn.innerHTML=`<span class="badge">${sel.length}</span>`;
  updateSeq();
  if(sel.length===5) document.getElementById('divine-btn').disabled=false;
}

function updateSeq(){
  const c=document.getElementById('seq-display'); c.innerHTML='';
  sel.forEach((el,i)=>{
    const cfg=ELEMENT_CFG[el];
    const item=document.createElement('div'); item.className='seq-item';
    item.innerHTML=`
      <div class="seq-dot" style="background:radial-gradient(circle at 35% 30%,${cfg.light},${cfg.color} 70%)"></div>
      <div class="seq-tag">${SEQ_TAGS[i]}</div>`;
    c.appendChild(item);
    setTimeout(()=>item.classList.add('visible'),40);
  });
}

// ═══ DIVINATION ═══════════════════════════════
function startDivination(){
  if(sel.length<5) return;
  document.getElementById('loading').classList.add('show');
  setTimeout(()=>{
    document.getElementById('loading').classList.remove('show');
    renderResult();
    const rs=document.getElementById('result-section');
    rs.classList.add('show');
    rs.scrollIntoView({behavior:'smooth',block:'start'});
  },2400);
}

function showToast(){
  const t = document.getElementById('copy-toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3200);
}

function copyAndOpenLine(){
  const text = buildResultText();
  // 複製到剪貼簿
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      showToast();
      setTimeout(()=>window.open('https://line.me/R/ti/p/@622vewho','_blank'), 600);
    }).catch(()=>{
      // fallback
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText='position:fixed;top:-999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand('copy'); showToast(); } catch(e){}
  document.body.removeChild(ta);
  setTimeout(()=>window.open('https://line.me/R/ti/p/@622vewho','_blank'), 600);
}

function buildLineSection(e4){
  const scents = READINGS.p4[e4].scents;
  const chips = scents.map(s=>`<span class="line-chip">🌿 ${s}</span>`).join('');
  return `
    <div class="aroma-prompt">✦ 今日為你推薦的療癒香氛 ✦</div>
    <div class="line-chips">${chips}</div>
    <div class="line-sub">想要找到以上香氛的相關資訊？<br>把你的占卜結果傳給我，讓星光繼續陪著你 🌙</div>
    <button class="line-btn" onclick="copyAndOpenLine()">
      ${LINE_SVG}
      傳送結果給官方帳號
    </button>`;
}

function renderResult(){
  const [e1,e2,e3,e4,e5]=sel;
  const stars=getLuck(e1,e5);

  // 星星卡
  let sh='';
  for(let i=1;i<=4;i++) sh+=`<span class="${i<=stars?'star-filled':'star-empty'}">★</span>`;
  document.getElementById('star-card').innerHTML=`
    <span class="star-row">${sh}</span>
    <div class="star-msg">${STAR_MSG[stars]}</div>`;

  // 位置卡
  const cont=document.getElementById('pos-cards'); cont.innerHTML='';
  [e1,e2,e3,e4,e5].forEach((el,i)=>{
    const card=document.createElement('div');
    card.className=`pos-card ${el}`;
    let body='';
    if(i===3){
      const r=READINGS.p4[el];
      body=`<p>${r.text}</p>
        <p style="margin-top:12px">試試看
          ${r.scents.map(s=>`<span class="aroma-chip">🌿 ${s}</span>`).join('')}
          的香氛，讓氣味輕輕帶領你找回那份平衡。
        </p>`;
    } else if(i===4){
      body=`<p>${READINGS.p5[el]}</p>`;
    } else {
      body=`<p>${READINGS[`p${i+1}`][el]}</p>`;
    }
    card.innerHTML=`
      <div class="pos-header">
        <div class="pos-orb ${el}"></div>
        <div class="pos-meta">
          <div class="pos-scene">${i+1} ── ${POS_SCENE[i]}</div>
          <div class="pos-name">${COLOR_IMAGE[el]}</div>
        </div>
      </div>
      <div class="pos-body">${body}</div>`;
    cont.appendChild(card);
  });

  // LINE 區（帶第4個顏色的香氛）
  document.getElementById('line-section').innerHTML = buildLineSection(e4);
}
